<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com https://www.gstatic.com https://*.firebaseapp.com https://*.google.com https://*.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.googleapis.com https://firestore.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://*.run.app https://*.google.com https://*.firebaseapp.com https://*.firebasestorage.app; frame-src 'self' https://*.firebaseapp.com https://accounts.google.com https://apis.google.com https://www.youtube.com https://youtube.com; worker-src 'self' blob:; manifest-src 'self';" />
    <title>UNLCKD Pro Trainer</title>
  </head>
  <body>
    <noscript>
      <div style="padding: 20px; text-align: center; color: white; background: #0a0a0a; height: 100vh;">
        <h1>JavaScript Required</h1>
        <p>Please enable JavaScript to use UNLCKD Pro Trainer.</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        // Only show alert for fatal errors that prevent boot
        if (!document.getElementById('root').hasChildNodes()) {
          console.error("FATAL ERROR:", msg, error);
          const errorDiv = document.createElement('div');
          errorDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;padding:20px;background:red;color:white;z-index:9999;text-align:center;font-family:sans-serif;font-size:14px;';
          errorDiv.innerHTML = '<b>UNLCKD Pro Trainer - Initialization Error</b><br/>' + 
            'The application failed to load on this browser. This usually happens in private/incognito mode or older browsers.<br/>' +
            '<button onclick="window.location.reload()" style="margin-top:10px;padding:5px 10px;border-radius:4px;border:none;">Reload Page</button>' +
            '<p style="font-size:10px;margin-top:10px opacity:0.7">' + msg + '</p>';
          document.body.appendChild(errorDiv);
        }
      };
    </script>
  </body>
</html>
